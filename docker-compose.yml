version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: restopos_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-restopos}
      POSTGRES_USER: ${DB_USER:-restopos}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-securepassword123}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/backend/src/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-restopos}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restopos_net

  redis:
    image: redis:7-alpine
    container_name: restopos_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass123} --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--pass", "${REDIS_PASSWORD:-redispass123}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - restopos_net

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: restopos_backend
    restart: always
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-restopos}:${DB_PASSWORD:-securepassword123}@postgres:5432/${DB_NAME:-restopos}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass123}@redis:6379
      JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-your-refresh-secret-key-change-in-production}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      IYZICO_API_KEY: ${IYZICO_API_KEY:-}
      IYZICO_SECRET_KEY: ${IYZICO_SECRET_KEY:-}
      IYZICO_BASE_URL: ${IYZICO_BASE_URL:-https://sandbox-api.iyzipay.com}
      YEMEKSEPETI_API_KEY: ${YEMEKSEPETI_API_KEY:-}
      GETIR_API_KEY: ${GETIR_API_KEY:-}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      UPLOAD_PATH: /app/uploads
    volumes:
      - uploads:/app/uploads
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - restopos_net

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    container_name: restopos_frontend
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:3001}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:3001}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - restopos_net

  nginx:
    image: nginx:1.25-alpine
    container_name: restopos_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads:/var/www/uploads:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
      - frontend
    networks:
      - restopos_net

volumes:
  pgdata:
  redisdata:
  uploads:

networks:
  restopos_net:
    driver: bridge
